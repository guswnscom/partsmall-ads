<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}PARTS-MALL — Korean Auto Parts South Africa{% endblock %}</title>
  <meta name="description" content="Specialized Korean auto parts in South Africa. Hyundai, Kia, Chevrolet, Suzuki, Ssangyong. Chat on WhatsApp now." />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" href="/assets/logo.png" />
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">
      <img src="/assets/logo.png" alt="PARTS-MALL" />
    </a>
    {% if is_open %}
      <span class="status open">● Open now</span>
    {% else %}
      <span class="status closed">● Closed — leave a message, we reply next business day</span>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>
    <p>PARTS-MALL South Africa · Boksburg · Edenvale</p>
    <p>Mon–Fri 08:00–17:00 · Sat 08:00–13:00 · Sun closed</p>
  </footer>
</body>
</html>
